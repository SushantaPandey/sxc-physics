<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SXC Physics Club | Presidential Manifesto</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        sxcblue: '#0a192f',
                        sxclight: '#112240',
                        sxcyellow: '#ffd700',
                        sxcaccent: '#64ffda',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a192f;
            color: #8892b0;
            margin: 0;
            padding: 0;
        }
        .glass-panel {
            background: rgba(17, 34, 64, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 255, 218, 0.1);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(100, 255, 218, 0.3);
        }
        /* Grid background pattern for scientific feel */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a192f; }
        ::-webkit-scrollbar-thumb { background: #112240; border-radius: 4px; border: 1px solid rgba(100, 255, 218, 0.2); }
        ::-webkit-scrollbar-thumb:hover { background: #64ffda; }
    </style>
</head>
<body class="bg-grid antialiased relative">
    
    <div class="fixed inset-0 z-0 pointer-events-none" 
         style="background-image: url('https://sxcphysicsclub.web.app/img/sxpc.jpg'); background-size: contain; background-position: center; background-repeat: no-repeat; opacity: 0.08;">
    </div>

    <div id="root" class="relative z-10"></div>

            Recycle: () => <i data-lucide="recycle" className="w-6 h-6 text-sxcaccent"></i>,
            Trophy: () => <i data-lucide="trophy" className="w-6 h-6 text-sxcaccent"></i>,

            Map: () => <i data-lucide="map" className="w-6 h-6 text-sxcaccent"></i>,
            Calendar: () => <i data-lucide="calendar" className="w-6 h-6 text-sxcaccent"></i>,
            Monitor: () => <i data-lucide="monitor" className="w-6 h-6 text-sxcaccent"></i>,
            Target: () => <i data-lucide="target" className="w-6 h-6 text-sxcaccent"></i>,
            CheckCircle: () => <i data-lucide="check-circle" className="w-4 h-4 text-sxcaccent mr-2 mt-1 shrink-0"></i>,
            Clock: () => <i data-lucide="clock" className="w-4 h-4 mr-1"></i>,
            DollarSign: () => <i data-lucide="dollar-sign" className="w-4 h-4 mr-1"></i>,
            Activity: () => <i data-lucide="activity" className="w-4 h-4 mr-1"></i>

                budget: "Low (Tokens of appreciation for local guest engineers)",

                id: 2,
                title: "Low-Cost Experiment Project",
                icon: "Recycle",
                objective: "Overcome lab equipment shortages by utilizing 'Physics from Waste'.",
                activities: ["Electric motors from scrap wire/magnets", "Periscopes using discarded mirrors", "Homemade electromagnets", "Water rocket aerodynamics"],

                budget: "Minimal (Recycled materials, basic consumables)",
                outcome: "Fosters scientific creativity, DIY engineering skills, and resourcefulness."

                budget: "Medium (Transportation & Logistics)",

            React.useEffect(() => {
                lucide.createIcons();

            return (

                            </div>

                                                    {item.id}. {item.title}
                                                </h3>
                                            </div>
                                        </div>

                                        {/* Card Body */}
                                        <div className="p-6 flex-grow flex flex-col gap-4">
                                            <div>
                                                <span className="text-xs uppercase font-bold tracking-wider text-slate-500 mb-1 block">Objective</span>
                                                <p className="text-sm text-slate-300">{item.objective}</p>
                                            </div>

                                            <div>
                                                <span className="text-xs uppercase font-bold tracking-wider text-slate-500 mb-2 block">Key Activities</span>
                                                <div className="flex flex-wrap gap-2">
                                                    {item.activities.map((act, i) => (
                                                        <span key={i} className="text-xs bg-sxcblue border border-slate-700 px-2.5 py-1 rounded-md text-slate-300">
                                                            {act}
                                                        </span>
                                                    ))}

                                            </div>
                                        </div>

                                            </div>
                                            <div className="flex items-center text-slate-400">
                                                <IconMapping.DollarSign /> <span className="text-slate-300 ml-1 truncate" title={item.budget}>{item.budget}</span>
                                            </div>
                                            <div className="flex items-start text-slate-400 sm:col-span-2 mt-2 pt-2 border-t border-slate-700/30">
                                                <IconMapping.Activity /> 
                                                <div className="ml-1">
                                                    <span className="text-sxcaccent block mb-0.5">Expected Outcome:</span>
                                                    <span className="text-slate-300 font-sans leading-snug block">{item.outcome}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );

                    </section>

                    {/* Conclusion / CTA */}
                    <footer className="border-t border-slate-800 bg-sxclight/20 relative overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-sxcaccent/5 via-transparent to-transparent"></div>
                        <div className="max-w-4xl mx-auto px-6 py-16 text-center relative z-10">
                            <h2 className="text-3xl font-bold text-slate-100 mb-6">Why this plan works.</h2>
                            <p className="text-slate-400 text-lg mb-8">
                                This is not just a list of ideas; it is a systematically verified, resource-conscious operational framework. By balancing high-end academics (Olympiad cell) with grassroots engagement (Low-cost projects) and modern delivery (ICT), this blueprint ensures the SXC Physics Club leads not just within the college, but sets a benchmark across Nepal.
                            </p>
                            <div className="inline-block border border-sxcaccent text-sxcaccent px-8 py-3 rounded text-sm font-mono font-bold tracking-widest hover:bg-sxcaccent/10 transition-colors cursor-pointer text-glow">
                                VOTE FOR PROGRESS. VOTE FOR EXECUTION.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
